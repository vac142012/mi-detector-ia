<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detector de Imágenes IA</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<header class="header">
  <img src="/images/logo-detector.jpeg" class="logo">
  <div class="header-text">
    <h1>Detector de Imágenes IA</h1>
    <p>Asignatura: Tecnología</p>
    <p>Curso: 1° Medio A</p>
    <p>Alumnas: Victoria Aránguiz - Victoria Prat</p>
  </div>
</header>

<div id="intro" class="intro">
  <div class="intro-box">
     <img src="/images/logo-detector.jpeg" class="logo">
    <h1>Detector de Imágenes IA</h1>
    <p>Este sistema estima la probabilidad de que una imagen haya sido generada por IA.</p>
    <button onclick="startApp()">Comenzar</button>
  </div>
</div>

<div id="app" class="container hidden">

  <div class="top-bar">
    <label class="file-button">
      Elegir imagen
      <input type="file" id="imageInput" accept="image/*" hidden>
    </label>
    <button onclick="uploadImage()">Analizar</button>
  </div>

  <div class="grid">

    <div class="panel">
      <h3>Imagen</h3>
      <img id="previewImage">
    </div>

    <div class="panel">
      <h3>Resultado</h3>

      <div id="loader" class="result-loader hidden">
        <div class="spinner"></div>
        Analizando...
      </div>

      <p id="result">Selecciona una imagen</p>

      <div id="resultBox" class="result-box hidden">
        <div class="donut">
          <div id="donutFill" class="donut-fill"></div>
          <div class="donut-center">
            <span id="donutPercent">0%</span>
          </div>
        </div>

        <p id="resultLabel"></p>
        <div id="resultExplanation" class="result-explanation"></div>
      </div>

    </div>

  </div>

</div>

<script src="script.js" defer></script>

</body>
</html>
