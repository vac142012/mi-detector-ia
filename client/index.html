<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detector de Imágenes IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🧠 HEADER FIJO -->
  <header class="header">

    <img
      src="https://colegiocentenariomaipu.cl/wp-content/uploads/2020/07/Logoweb.png"
      class="logo"
      alt="logo"
    />

    <div class="header-text">
      <h1>Detector de Imágenes IA</h1>
      <p>Asignatura: Tecnología</p>
      <p>Curso: 1° Medio A</p>
      <p>Alumnas: Victoria Aránguiz - Victoria Prat</p>
    </div>

  </header>

  <!-- 🧠 INTRO -->
  <div id="intro" class="intro">
    <div class="intro-content">
      <button onclick="startApp()">Comenzar</button>
    </div>
  </div>

  <!-- 🚀 APP -->
  <div id="app" class="container hidden">

    <div class="top-bar">
      <input type="file" id="imageInput" accept="image/*" />
      <button onclick="uploadImage()">Analizar</button>
    </div>

    <div class="grid">

      <!-- IZQUIERDA: IMAGEN -->
      <div class="panel left">
        <h3>Imagen</h3>
        <img id="previewImage" />
      </div>

      <!-- DERECHA: RESULTADO -->
      <div class="panel right">
        <h3>Resultado</h3>
        <div id="loader" class="hidden">🔍 Analizando...</div>
        <p id="result">Selecciona una imagen</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
