<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detector de Imágenes IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🧠 HEADER -->
  <header class="header">
    <img src="https://colegiocentenariomaipu.cl/wp-content/uploads/2020/07/Logoweb.png" />
    <div class="header-text">
      <h2>Primero Medio A</h2>
      <p>Victoria Aranguiz - Victoria Prat</p>
    </div>
  </header>

  <!-- 🧠 INTRO -->
  <div id="intro" class="intro">
    <div class="intro-content">
      <h1>Detector de Imágenes IA</h1>

      <p>
        Proyecto escolar que analiza imágenes y estima si fueron generadas por Inteligencia Artificial.
      </p>

      <button onclick="startApp()">Comenzar</button>
    </div>
  </div>

  <!-- 🚀 APP -->
  <div id="app" class="container hidden">

    <!-- input -->
    <div class="top-bar">
      <input type="file" id="imageInput" accept="image/*" />
      <button onclick="uploadImage()">Analizar</button>
    </div>

    <!-- layout 2 columnas -->
    <div class="grid">

      <!-- izquierda: resultado -->
      <div class="panel left">
        <h3>Resultado</h3>

        <div id="loader" class="hidden">🔍 Analizando...</div>
        <p id="result">Selecciona una imagen</p>
      </div>

      <!-- derecha: imagen -->
      <div class="panel right">
        <h3>Imagen</h3>
        <img id="previewImage" />
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
