<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detector de Imágenes IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🧠 INTRO -->
  <div id="intro" class="intro">
    <div class="intro-content">

      <img
        class="intro-logo"
        src="https://colegiocentenariomaipu.cl/wp-content/uploads/2020/07/Logoweb.png"
        alt="logo colegio"
      />

      <h1>Detector de Imágenes IA</h1>

      <p><strong>Asignatura:</strong> Tecnología</p>
      <p><strong>Curso:</strong> Primero Medio A</p>

      <p>
        Proyecto escolar que analiza imágenes y estima si fueron generadas por Inteligencia Artificial.
      </p>

      <button onclick="startApp()">Comenzar</button>
    </div>
  </div>

  <!-- 🚀 APP -->
  <div id="app" class="container hidden">

    <!-- top bar -->
    <div class="top-bar">
      <input type="file" id="imageInput" accept="image/*" />
      <button onclick="uploadImage()">Analizar</button>
    </div>

    <!-- GRID -->
    <div class="grid">

      <!-- IZQUIERDA: IMAGEN -->
      <div class="panel left">
        <h3>Imagen</h3>
        <img id="previewImage" />
      </div>

      <!-- DERECHA: RESULTADO -->
      <div class="panel right">
        <h3>Resultado</h3>

        <div id="loader" class="hidden">🔍 Analizando...</div>
        <p id="result">Selecciona una imagen</p>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
